<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>EndoHub</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="bgGlow"></div>

<div class="container">

<header>

<h1>EndoHub</h1>
<p>Endodontic Clinical Intelligence</p>

</header>


<section class="grid">

<div class="panel">
<label>Doctor</label>
<h2 id="name">Dr Vivek Aggarwal</h2>
</div>

<div class="panel">
<label>Patient ID</label>
<h2 id="id">ENDO-001</h2>
</div>

<div class="panel">
<label>Procedure</label>
<h2 id="procedure">Root Canal Treatment</h2>
</div>

<div class="panel">
<label>Tooth</label>
<h2 id="tooth">Upper First Molar</h2>
</div>

<div class="panel">
<label>Date</label>
<h2 id="date">2026-03-16</h2>
</div>

<div class="panel wide">
<label>Clinical Notes</label>
<h2 id="notes">Radiograph taken. Infection confirmed.</h2>
</div>

</section>

<div class="buttons">

<button class="btn" onclick="toggleForm()">Edit</button>

<button class="btn primary" onclick="saveData()">Save</button>

</div>

<form id="form">

<input id="f_name" value="Dr Vivek Aggarwal">
<input id="f_id" value="ENDO-001">
<input id="f_procedure" value="Root Canal Treatment">
<input id="f_tooth" value="Upper First Molar">
<input id="f_date" value="2026-03-16">

<textarea id="f_notes">Radiograph taken. Infection confirmed.</textarea>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
